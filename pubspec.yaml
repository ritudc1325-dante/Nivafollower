name: niva_follower
description: "Instagram Follower and Coin Utility App with Rotating Proxy and VIP System."
publish_to: 'none'
version: 1.0.0+1

environment:
    sdk: '>=3.0.0 <4.0.0'

dependencies:
    flutter:
        sdk: flutter
    cupertino_icons: ^1.0.8

    # Firebase
    firebase_core: ^3.6.0
    cloud_firestore: ^5.4.4
    firebase_messaging: ^15.2.10

    # Core Infrastructure
    http: ^1.2.0
    flutter_secure_storage: ^9.0.0
    flutter_inappwebview: ^6.0.0
    url_launcher: ^6.3.2
    share_plus: ^10.1.0

    # Premium UI/UX
    flutter_svg: ^2.0.10+1
    font_awesome_flutter: ^10.7.0
    shared_preferences: ^2.5.5

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^3.0.0
    flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
    android: "ic_launcher"
    ios: true
    image_path: "assets/images/1.png"
    adaptive_icon_background: "#131313"
    adaptive_icon_foreground: "assets/images/1.png"

flutter:
    uses-material-design: true
    assets:
        - assets/images/1.png
        - assets/background.jpg